apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  labels:
    app: booking-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: booking-service:latest
        ports:
        - containerPort: 3005
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: booking-config
              key: db_host
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: booking-config
              key: kafka_brokers
        - name: PAYSTACK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: payment-secrets
              key: paystack_secret
        - name: FLUTTERWAVE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: payment-secrets
              key: flutterwave_secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
spec:
  selector:
    app: booking-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3005
  type: ClusterIP
