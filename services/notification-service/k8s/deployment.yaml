apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: realestate
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: realestate/notification-service:latest
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  ports:
  - port: 8002
  selector:
    app: notification-service
