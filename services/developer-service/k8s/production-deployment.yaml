---
# Production Deployment for developer-service
# Auto-generated – edit with care
apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-service
  namespace: realestate-production
  labels:
    app: developer-service
    component: microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: developer-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: developer-service
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
      - name: developer-service
        image: ${DOCKER_REGISTRY}/developer-service:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 3006
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3006"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: REDIS_URL
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: developer-service
  namespace: realestate-production
spec:
  selector:
    app: developer-service
  ports:
  - name: http
    port: 80
    targetPort: 3006
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: developer-service-pdb
  namespace: realestate-production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: developer-service
