apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-service
  namespace: realestate
spec:
  replicas: 3
  selector:
    matchLabels:
      app: developer-service
  template:
    metadata:
      labels:
        app: developer-service
    spec:
      containers:
      - name: developer-service
        image: realestate/developer-service:latest
        ports:
        - containerPort: 3005
        env:
        - name: PORT
          value: "3005"
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "developer_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: developer-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: developer-secrets
              key: db-password
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: developer-service
  namespace: realestate
spec:
  type: ClusterIP
  ports:
  - port: 3005
    targetPort: 3005
  selector:
    app: developer-service
