apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  namespace: realestate
  labels:
    app: crm-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
        version: v1
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "crm-service"
        dapr.io/app-port: "3004"
        dapr.io/log-level: "info"
    spec:
      containers:
      - name: crm-service
        image: realestate/crm-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3004"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: crm-config
              key: db-host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "crm_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: crm-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crm-secrets
              key: db-password
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: crm-config
              key: kafka-brokers
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: crm-service
  namespace: realestate
  labels:
    app: crm-service
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
    name: http
  selector:
    app: crm-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-config
  namespace: realestate
data:
  db-host: "postgres-service.realestate.svc.cluster.local"
  kafka-brokers: "kafka-service.realestate.svc.cluster.local:9092"
---
apiVersion: v1
kind: Secret
metadata:
  name: crm-secrets
  namespace: realestate
type: Opaque
stringData:
  db-user: "postgres"
  db-password: "postgres"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crm-service-hpa
  namespace: realestate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crm-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
