user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/x-protobuf
        application/vnd.mapbox-vector-tile
        text/plain
        text/css
        text/xml
        application/xml;

    # Tile cache configuration
    proxy_cache_path /var/cache/nginx/tiles
        levels=1:2
        keys_zone=tiles:100m
        max_size=10g
        inactive=30d
        use_temp_path=off;

    # Upstream Martin server
    upstream martin {
        server martin:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Vector tiles endpoint
        location ~ ^/tiles/(?<source>[^/]+)/(?<z>\d+)/(?<x>\d+)/(?<y>\d+)\.(?<format>pbf|mvt)$ {
            # Enable caching
            proxy_cache tiles;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            # Cache key
            proxy_cache_key "$source:$z:$x:$y:$format";
            
            # Headers
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            
            # Proxy to Martin
            proxy_pass http://martin/$source/$z/$x/$y.$format;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # TileJSON metadata
        location ~ ^/tiles/(?<source>[^/]+)\.json$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type application/json;
            
            proxy_pass http://martin/$source.json;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Catalog endpoint
        location /catalog {
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type application/json;
            
            proxy_pass http://martin/catalog;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health check proxy
        location /martin/health {
            access_log off;
            proxy_pass http://martin/health;
        }

        # Cache purge endpoint (admin only)
        location /purge {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            
            proxy_cache_purge tiles $arg_key;
        }

        # Cache stats
        location /cache-stats {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            
            stub_status on;
            access_log off;
        }
    }
}
