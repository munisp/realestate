version: '3.8'

# ML Infrastructure Stack
# Combines Kafka, MinIO, Spark, Ray, MLflow for end-to-end ML pipeline
# Usage: docker-compose -f docker-compose.ml-infra.yml up -d

services:
  # ============================================================================
  # Message Queue (Kafka + Zookeeper)
  # ============================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ml-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ml-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Object Storage (MinIO - S3 Compatible)
  # ============================================================================
  
  minio:
    image: minio/minio:latest
    container_name: ml-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create MinIO buckets for lakehouse layers
  minio-setup:
    image: minio/mc:latest
    container_name: ml-minio-setup
    depends_on:
      - minio
    networks:
      - ml-network
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 admin admin123456;
      /usr/bin/mc mb myminio/bronze --ignore-existing;
      /usr/bin/mc mb myminio/silver --ignore-existing;
      /usr/bin/mc mb myminio/gold --ignore-existing;
      /usr/bin/mc mb myminio/mlflow --ignore-existing;
      /usr/bin/mc mb myminio/checkpoints --ignore-existing;
      /usr/bin/mc mb myminio/models --ignore-existing;
      echo 'MinIO buckets created successfully';
      exit 0;
      "

  # ============================================================================
  # Apache Spark (Batch ETL)
  # ============================================================================
  
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: ml-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8090:8080"  # Changed from 8080 to avoid conflict
    volumes:
      - ./lakehouse/scripts:/opt/spark-apps
      - ./lakehouse/configs:/opt/spark-conf
    networks:
      - ml-network

  spark-worker-1:
    image: bitnami/spark:3.5.0
    container_name: ml-spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./lakehouse/scripts:/opt/spark-apps
      - ./lakehouse/configs:/opt/spark-conf
    networks:
      - ml-network

  spark-worker-2:
    image: bitnami/spark:3.5.0
    container_name: ml-spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./lakehouse/scripts:/opt/spark-apps
      - ./lakehouse/configs:/opt/spark-conf
    networks:
      - ml-network

  # ============================================================================
  # MLflow (Model Tracking & Registry)
  # ============================================================================
  
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ml-mlflow
    depends_on:
      - minio
    ports:
      - "5050:5000"  # Changed to 5050 to avoid conflict with Python services
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Ray Cluster (Distributed ML Training)
  # ============================================================================
  
  ray-head:
    image: rayproject/ray:2.9.0-py310
    container_name: ml-ray-head
    command: >
      ray start --head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --block
    ports:
      - "6379:6379"      # Ray GCS
      - "8265:8265"      # Ray Dashboard
      - "10001:10001"    # Ray Client
    environment:
      - RAY_BACKEND_LOG_LEVEL=info
    volumes:
      - ./lakehouse/scripts:/workspace
    networks:
      - ml-network
    shm_size: 2gb

  ray-worker-1:
    image: rayproject/ray:2.9.0-py310
    container_name: ml-ray-worker-1
    depends_on:
      - ray-head
    command: ray start --address=ray-head:6379 --block
    environment:
      - RAY_BACKEND_LOG_LEVEL=info
    volumes:
      - ./lakehouse/scripts:/workspace
    networks:
      - ml-network
    shm_size: 2gb

  ray-worker-2:
    image: rayproject/ray:2.9.0-py310
    container_name: ml-ray-worker-2
    depends_on:
      - ray-head
    command: ray start --address=ray-head:6379 --block
    environment:
      - RAY_BACKEND_LOG_LEVEL=info
    volumes:
      - ./lakehouse/scripts:/workspace
    networks:
      - ml-network
    shm_size: 2gb

  # ============================================================================
  # Jupyter (Ad-hoc Analysis & Development)
  # ============================================================================
  
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: ml-jupyter
    depends_on:
      - spark-master
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./lakehouse/notebooks:/home/jovyan/work
      - ./lakehouse/scripts:/home/jovyan/scripts
    networks:
      - ml-network

volumes:
  minio-data:
    driver: local
  mlflow-data:
    driver: local

networks:
  ml-network:
    driver: bridge
    name: ml-infrastructure
