name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  GO_VERSION: "1.21"
  PYTHON_VERSION: "3.11"

jobs:
  # ── TypeScript / Node.js ──────────────────────────────────────────────────
  typescript:
    name: TypeScript (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm run check

      - name: Run tests
        run: pnpm run test
        env:
          DATABASE_URL: ""
          JWT_SECRET: "test-secret-for-ci-only"
          NODE_ENV: test

  # ── Go services ───────────────────────────────────────────────────────────
  go:
    name: Go (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/go/go.sum

      - name: Go vet
        run: go vet ./...
        working-directory: services/go

      - name: Go test
        run: go test ./... -timeout 60s
        working-directory: services/go

  # ── Python services ───────────────────────────────────────────────────────
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff (linter)
        run: pip install ruff

      - name: Lint Python services
        run: ruff check services/python/ ml-services/ --ignore E501 || true

  # ── Security scanning ─────────────────────────────────────────────────────
  security:
    name: Security scan (npm audit + Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit (high severity)
        run: pnpm audit --audit-level=high || true

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: "0"

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker build (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build main app image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
