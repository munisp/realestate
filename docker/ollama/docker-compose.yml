version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - realestate-network

  ollama-chatbot:
    build:
      context: ../../python-services/ollama-chatbot
      dockerfile: Dockerfile
    container_name: ollama-chatbot-api
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434
      - OLLAMA_MODEL=llama2
      - PORT=5000
      - FLASK_ENV=production
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - realestate-network

  # Model initialization container (runs once)
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: /bin/sh
    command: >
      -c "
      sleep 10 &&
      ollama pull llama2 &&
      ollama pull mistral &&
      echo 'Models downloaded successfully'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - realestate-network
    restart: "no"

volumes:
  ollama-data:
    driver: local

networks:
  realestate-network:
    external: true
