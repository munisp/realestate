---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: realestate-production
  labels:
    name: realestate-production
---
# Main Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realestate-app
  namespace: realestate-production
  labels:
    app: realestate-app
    component: backend
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: realestate-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: realestate-app
        component: backend
    spec:
      serviceAccountName: realestate-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
      - name: realestate-app
        image: ${DOCKER_REGISTRY}/realestate-app:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: JWT_SECRET
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: stripe-keys
              key: STRIPE_SECRET_KEY
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: stripe-keys
              key: STRIPE_WEBHOOK_SECRET
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: REDIS_URL
        - name: SENDGRID_API_KEY
          valueFrom:
            secretKeyRef:
              name: sendgrid-api-key
              key: SENDGRID_API_KEY
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - realestate-app
              topologyKey: kubernetes.io/hostname
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: realestate-app
  namespace: realestate-production
  labels:
    app: realestate-app
spec:
  selector:
    app: realestate-app
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: realestate-app-sa
  namespace: realestate-production
---
# PodDisruptionBudget – ensure at least 2 replicas are always available
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: realestate-app-pdb
  namespace: realestate-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: realestate-app
---
# NetworkPolicy – restrict ingress/egress to known services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: realestate-app-netpol
  namespace: realestate-production
spec:
  podSelector:
    matchLabels:
      app: realestate-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: realestate-production
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443    # External HTTPS (Stripe, SendGrid, etc.)
    - protocol: TCP
      port: 53     # DNS
    - protocol: UDP
      port: 53
