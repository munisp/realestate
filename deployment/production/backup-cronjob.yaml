---
# PostgreSQL Backup CronJob
# Runs daily at 02:30 UTC, uploads encrypted dump to S3, retains 30 days.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: realestate-production
  labels:
    app: postgres-backup
    component: database
spec:
  schedule: "30 2 * * *"          # 02:30 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: backup-sa
          containers:
          - name: postgres-backup
            image: postgres:15-alpine
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="/tmp/realestate_${TIMESTAMP}.sql.gz"

              echo "[backup] Starting PostgreSQL backup at ${TIMESTAMP}"

              # Dump and compress
              pg_dump "$DATABASE_URL" | gzip > "$BACKUP_FILE"

              echo "[backup] Dump complete: $(du -sh $BACKUP_FILE | cut -f1)"

              # Upload to S3
              if [ -n "$S3_BUCKET" ]; then
                # Requires aws-cli or s3cmd; use a sidecar or init-container if needed
                apk add --no-cache aws-cli 2>/dev/null || true
                aws s3 cp "$BACKUP_FILE" \
                  "s3://${S3_BUCKET}/postgres/$(basename $BACKUP_FILE)" \
                  --storage-class STANDARD_IA
                echo "[backup] Uploaded to s3://${S3_BUCKET}/postgres/"

                # Prune backups older than 30 days
                aws s3 ls "s3://${S3_BUCKET}/postgres/" \
                  | awk '{print $4}' \
                  | while read key; do
                      DATE=$(echo "$key" | grep -oP '\d{8}')
                      CUTOFF=$(date -d "30 days ago" +%Y%m%d 2>/dev/null || date -v-30d +%Y%m%d)
                      if [ "$DATE" -lt "$CUTOFF" ] 2>/dev/null; then
                        aws s3 rm "s3://${S3_BUCKET}/postgres/$key"
                        echo "[backup] Pruned old backup: $key"
                      fi
                    done
              fi

              rm -f "$BACKUP_FILE"
              echo "[backup] Backup complete"
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: DATABASE_URL
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: backup-config
                  key: S3_BUCKET
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              runAsNonRoot: true
              runAsUser: 70          # postgres user in alpine image
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
---
# ConfigMap for backup configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-config
  namespace: realestate-production
data:
  S3_BUCKET: "realestate-platform-backups"
  RETENTION_DAYS: "30"
---
# ServiceAccount for backup job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: realestate-production
