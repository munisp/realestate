# OSRM reverse proxy — routes /car, /motorcycle, /walk to separate OSRM instances
upstream osrm_car        { server osrm-car:5000; }
upstream osrm_motorcycle { server osrm-motorcycle:5000; }
upstream osrm_walk       { server osrm-walk:5000; }

server {
    listen 80;
    server_name _;

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Car routing
    location /car/ {
        rewrite ^/car/(.*)$ /$1 break;
        proxy_pass http://osrm_car;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=300";
    }

    # Motorcycle routing (okada/keke in Nigeria)
    location /motorcycle/ {
        rewrite ^/motorcycle/(.*)$ /$1 break;
        proxy_pass http://osrm_motorcycle;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=300";
    }

    # Walking
    location /walk/ {
        rewrite ^/walk/(.*)$ /$1 break;
        proxy_pass http://osrm_walk;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=300";
    }

    # Default to car
    location / {
        proxy_pass http://osrm_car;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }
}
