# Martin — PostGIS MVT tile server
# Serves vector tiles directly from PostgreSQL/PostGIS
# Docs: https://maplibre.org/martin/
version: '3.8'
services:
  martin:
    image: ghcr.io/maplibre/martin:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MARTIN_KEEP_ALIVE: "75"
      MARTIN_LISTEN_ADDRESSES: "0.0.0.0:3000"
    command: >
      --config /config/martin.yaml
    volumes:
      - ./martin.yaml:/config/martin.yaml:ro
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
