apiVersion: apps/v1
kind: Deployment
metadata:
  name: martin-tiles
  namespace: realestate
  labels:
    app: martin-tiles
spec:
  replicas: 2
  selector:
    matchLabels:
      app: martin-tiles
  template:
    metadata:
      labels:
        app: martin-tiles
    spec:
      containers:
        - name: martin
          image: ghcr.io/maplibre/martin:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: martin-config
---
apiVersion: v1
kind: Service
metadata:
  name: martin-tiles
  namespace: realestate
spec:
  selector:
    app: martin-tiles
  ports:
    - port: 3001
      targetPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: martin-config
  namespace: realestate
data:
  martin.yaml: |
    listen_addresses: "0.0.0.0:3000"
    keep_alive: 75
    worker_processes: 4
    auto_publish:
      tables:
        from_schemas: [public]
        clip_geom: true
