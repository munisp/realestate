version: '3.8'

# Production Infrastructure Stack
# Orchestrates all critical priority services: Keycloak, APISIX, OpenAppSec, Permify, PgBouncer, Redis

networks:
  production-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  keycloak-postgres-data:
  permify-postgres-data:
  pgbouncer-data:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  etcd-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  openappsec-data:

services:
  # ========== Keycloak Authentication ==========
  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - production-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    restart: always
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY: edge
      KC_METRICS_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - production-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== APISIX API Gateway ==========
  etcd:
    image: bitnami/etcd:3.5
    container_name: etcd
    restart: always
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
    volumes:
      - etcd-data:/bitnami/etcd
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
    image: apache/apisix:3.7.0-debian
    container_name: apisix
    restart: always
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9091:9091"
    networks:
      - production-network

  # ========== OpenAppSec WAF ==========
  openappsec:
    image: ghcr.io/openappsec/agent:latest
    container_name: openappsec
    restart: always
    privileged: true
    environment:
      - AGENT_TOKEN=${OPENAPPSEC_TOKEN}
      - AGENT_MODE=standalone
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./openappsec/policy.yaml:/etc/cp/conf/policy.yaml:ro
      - openappsec-data:/var/log/nano_agent
    networks:
      - production-network
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - production-network

  # ========== Permify Authorization ==========
  permify-db:
    image: postgres:15-alpine
    container_name: permify-db
    restart: always
    environment:
      POSTGRES_USER: permify
      POSTGRES_PASSWORD: ${PERMIFY_DB_PASSWORD}
      POSTGRES_DB: permify
    volumes:
      - permify-postgres-data:/var/lib/postgresql/data
    networks:
      - production-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permify"]
      interval: 10s
      timeout: 5s
      retries: 5

  permify:
    image: ghcr.io/permify/permify:latest
    container_name: permify
    restart: always
    command: serve
    environment:
      - PERMIFY_DATABASE_ENGINE=postgres
      - PERMIFY_DATABASE_URI=postgres://permify:${PERMIFY_DB_PASSWORD}@permify-db:5432/permify?sslmode=disable
      - PERMIFY_DATABASE_AUTO_MIGRATE=true
      - PERMIFY_AUTHN_ENABLED=true
      - PERMIFY_AUTHN_METHOD=oidc
      - PERMIFY_AUTHN_OIDC_ISSUER=http://keycloak:8080/realms/realestate
    ports:
      - "3476:3476"
      - "3478:3478"
    depends_on:
      permify-db:
        condition: service_healthy
    networks:
      - production-network

  # ========== PgBouncer Connection Pooling ==========
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: pgbouncer
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
    ports:
      - "6432:5432"
    networks:
      - production-network

  # ========== Redis Caching Cluster ==========
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - production-network

  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    restart: always
    command: >
      redis-server
      --replicaof redis-master 6379
      --masterauth ${REDIS_PASSWORD}
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-replica-1-data:/data
    networks:
      - production-network
    depends_on:
      - redis-master

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    restart: always
    command: >
      redis-server
      --replicaof redis-master 6379
      --masterauth ${REDIS_PASSWORD}
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-replica-2-data:/data
    networks:
      - production-network
    depends_on:
      - redis-master

  # ========== Go Microservices ==========
  auth-service:
    build:
      context: ../microservices/go/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=realestate
      - REDIS_URL=redis://redis-master:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - keycloak
      - redis-master
      - pgbouncer
    networks:
      - production-network

  # ========== Python Microservices ==========
  security-scanner:
    build:
      context: ../microservices/python/security-scanner
      dockerfile: Dockerfile
    container_name: security-scanner
    restart: always
    environment:
      - PORT=8000
    ports:
      - "8082:8000"
    networks:
      - production-network

  # ========== Monitoring ==========
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - production-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - production-network
    depends_on:
      - prometheus
