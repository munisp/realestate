# Dapr Components Configuration

---
# Pub/Sub - Kafka
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka:9092"
  - name: authType
    value: "none"
  - name: consumerGroup
    value: "realestate-platform"
  - name: clientId
    value: "dapr-pubsub"

---
# State Store - Redis
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: "redis:6379"
  - name: redisPassword
    value: ""
  - name: actorStateStore
    value: "true"
  - name: enableTLS
    value: "false"

---
# Secret Store - Kubernetes
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kubernetes
  namespace: default
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []

---
# Bindings - Kafka Output
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-binding
  namespace: default
spec:
  type: bindings.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka:9092"
  - name: topics
    value: "property-events,user-events,transaction-events"
  - name: publishTopic
    value: "platform-events"
  - name: consumerGroup
    value: "dapr-bindings"

---
# Resiliency Policy
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: resiliency-policy
  namespace: default
spec:
  policies:
    # Retry policy
    retries:
      DefaultRetryPolicy:
        policy: constant
        duration: 5s
        maxRetries: 3
      
      ServiceInvocationRetry:
        policy: exponential
        maxInterval: 60s
        maxRetries: 5
    
    # Timeout policy
    timeouts:
      DefaultTimeout: 60s
      ServiceInvocationTimeout: 30s
      StateStoreTimeout: 10s
    
    # Circuit breaker policy
    circuitBreakers:
      DefaultCircuitBreaker:
        maxRequests: 5
        interval: 10s
        timeout: 30s
        trip: consecutiveFailures >= 5
      
      ServiceInvocationCircuitBreaker:
        maxRequests: 10
        interval: 30s
        timeout: 60s
        trip: consecutiveFailures >= 3
  
  targets:
    apps:
      property-service:
        retry: ServiceInvocationRetry
        timeout: ServiceInvocationTimeout
        circuitBreaker: ServiceInvocationCircuitBreaker
      
      user-service:
        retry: ServiceInvocationRetry
        timeout: ServiceInvocationTimeout
        circuitBreaker: ServiceInvocationCircuitBreaker
      
      transaction-service:
        retry: ServiceInvocationRetry
        timeout: ServiceInvocationTimeout
        circuitBreaker: ServiceInvocationCircuitBreaker
      
      valuation-service:
        retry: ServiceInvocationRetry
        timeout: ServiceInvocationTimeout
        circuitBreaker: ServiceInvocationCircuitBreaker
      
      geospatial-service:
        retry: ServiceInvocationRetry
        timeout: ServiceInvocationTimeout
        circuitBreaker: ServiceInvocationCircuitBreaker
    
    components:
      statestore:
        outbound:
          retry: DefaultRetryPolicy
          timeout: StateStoreTimeout
          circuitBreaker: DefaultCircuitBreaker
      
      pubsub:
        outbound:
          retry: DefaultRetryPolicy
          timeout: DefaultTimeout
          circuitBreaker: DefaultCircuitBreaker

---
# Subscription - Property Events
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: property-events-sub
  namespace: default
spec:
  topic: property-events
  routes:
    default: /api/v1/events/property
  pubsubname: pubsub
  scopes:
  - property-service
  - valuation-service
  - geospatial-service

---
# Subscription - User Events
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: user-events-sub
  namespace: default
spec:
  topic: user-events
  routes:
    default: /api/v1/events/user
  pubsubname: pubsub
  scopes:
  - user-service
  - property-service

---
# Subscription - Transaction Events
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: transaction-events-sub
  namespace: default
spec:
  topic: transaction-events
  routes:
    default: /api/v1/events/transaction
  pubsubname: pubsub
  scopes:
  - transaction-service
  - user-service
  - property-service
