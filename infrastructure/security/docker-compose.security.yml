version: '3.8'

services:
  # Wazuh Manager - SIEM and Security Monitoring
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    container_name: wazuh-manager
    hostname: wazuh-manager
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh-api-configuration:/var/ossec/api/configuration
      - wazuh-etc:/var/ossec/etc
      - wazuh-logs:/var/ossec/logs
      - wazuh-queue:/var/ossec/queue
      - wazuh-var-multigroups:/var/ossec/var/multigroups
      - wazuh-integrations:/var/ossec/integrations
      - wazuh-active-response:/var/ossec/active-response/bin
      - wazuh-agentless:/var/ossec/agentless
      - wazuh-wodles:/var/ossec/wodles
      - filebeat-etc:/etc/filebeat
      - filebeat-var:/var/lib/filebeat
    networks:
      - security-network

  # Wazuh Indexer (OpenSearch)
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.0
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    networks:
      - security-network

  # Wazuh Dashboard
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.0
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    restart: always
    ports:
      - "5601:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh-manager
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    depends_on:
      - wazuh-indexer
    networks:
      - security-network

  # OpenCTI - Threat Intelligence Platform
  opencti-redis:
    image: redis:7-alpine
    container_name: opencti-redis
    restart: always
    volumes:
      - opencti-redis-data:/data
    networks:
      - security-network

  opencti-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: opencti-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - opencti-esdata:/usr/share/elasticsearch/data
    restart: always
    networks:
      - security-network

  opencti-minio:
    image: minio/minio:latest
    container_name: opencti-minio
    ports:
      - "9002:9000"
    environment:
      MINIO_ROOT_USER: opencti
      MINIO_ROOT_PASSWORD: opencti123
    command: server /data
    volumes:
      - opencti-s3data:/data
    restart: always
    networks:
      - security-network

  opencti-rabbitmq:
    image: rabbitmq:3.12-management
    container_name: opencti-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=opencti
      - RABBITMQ_DEFAULT_PASS=opencti123
    volumes:
      - opencti-amqpdata:/var/lib/rabbitmq
    restart: always
    networks:
      - security-network

  opencti:
    image: opencti/platform:5.12.0
    container_name: opencti
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - APP__PORT=8080
      - APP__BASE_URL=http://localhost:8080
      - APP__ADMIN__EMAIL=admin@opencti.io
      - APP__ADMIN__PASSWORD=${WAZUH_ADMIN_PASSWORD:?WAZUH_ADMIN_PASSWORD must be set}
      - APP__ADMIN__TOKEN=change-me-in-production
      - APP__APP_LOGS__LOGS_LEVEL=info
      - REDIS__HOSTNAME=opencti-redis
      - REDIS__PORT=6379
      - ELASTICSEARCH__URL=http://opencti-elasticsearch:9200
      - MINIO__ENDPOINT=opencti-minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=opencti
      - MINIO__SECRET_KEY=opencti123
      - RABBITMQ__HOSTNAME=opencti-rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__PORT_MANAGEMENT=15672
      - RABBITMQ__MANAGEMENT_SSL=false
      - RABBITMQ__USERNAME=opencti
      - RABBITMQ__PASSWORD=opencti123
    ports:
      - "8081:8080"
    depends_on:
      - opencti-redis
      - opencti-elasticsearch
      - opencti-minio
      - opencti-rabbitmq
    restart: always
    networks:
      - security-network

  # Open Policy Agent (OPA)
  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=debug"
      - "--log-format=json"
      - "/policies"
    volumes:
      - ./opa-policies:/policies
    restart: always
    networks:
      - security-network

  # Kubecost (for Kubernetes cost management)
  kubecost-cost-analyzer:
    image: gcr.io/kubecost1/cost-model:latest
    container_name: kubecost
    ports:
      - "9003:9003"
    environment:
      - PROMETHEUS_SERVER_ENDPOINT=http://prometheus:9090
    restart: always
    networks:
      - security-network

  # Falco - Runtime Security
  falco:
    image: falcosecurity/falco:latest
    container_name: falco
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /dev:/host/dev
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - ./falco-rules:/etc/falco/rules.d
    restart: always
    networks:
      - security-network

  # Trivy - Vulnerability Scanner
  trivy:
    image: aquasec/trivy:latest
    container_name: trivy
    command: ["server", "--listen", "0.0.0.0:8082"]
    ports:
      - "8082:8082"
    volumes:
      - trivy-cache:/root/.cache
    restart: always
    networks:
      - security-network

volumes:
  wazuh-api-configuration:
  wazuh-etc:
  wazuh-logs:
  wazuh-queue:
  wazuh-var-multigroups:
  wazuh-integrations:
  wazuh-active-response:
  wazuh-agentless:
  wazuh-wodles:
  filebeat-etc:
  filebeat-var:
  wazuh-indexer-data:
  opencti-redis-data:
  opencti-esdata:
  opencti-s3data:
  opencti-amqpdata:
  trivy-cache:

networks:
  security-network:
    name: security-network
    driver: bridge
