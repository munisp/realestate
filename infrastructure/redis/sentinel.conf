# Redis Sentinel Configuration for High Availability
port 26379
sentinel monitor realestate-master redis-master 6379 2
sentinel auth-pass realestate-master ${REDIS_PASSWORD}
sentinel down-after-milliseconds realestate-master 5000
sentinel failover-timeout realestate-master 60000
sentinel parallel-syncs realestate-master 1
sentinel announce-ip ${POD_IP}
sentinel announce-port 26379
logfile /var/log/redis/sentinel.log
loglevel notice
