# NOTE: Mojaloop (open-source payment switch) requires MySQL internally.
# This is an upstream dependency and is NOT used by the main realestate platform.
# The main platform uses PostgreSQL exclusively.
version: '3.8'

services:
  # MySQL for Mojaloop central services
  mysql:
    image: mysql:8.0
    container_name: mojaloop-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=central_ledger
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - mojaloop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for Account Lookup Service
  mongodb:
    image: mongo:6.0
    container_name: mojaloop-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    volumes:
      - mongodb-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - mojaloop-network

  # Kafka for event streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mojaloop-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - mojaloop-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mojaloop-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - mojaloop-network

  # Central Ledger Service
  central-ledger:
    image: mojaloop/central-ledger:v17.0.0
    container_name: mojaloop-central-ledger
    depends_on:
      - mysql
      - kafka
    environment:
      - CLEDG_DATABASE__HOST=mysql
      - CLEDG_DATABASE__PORT=3306
      - CLEDG_DATABASE__USER=root
      - CLEDG_DATABASE__PASSWORD=root
      - CLEDG_DATABASE__DATABASE=central_ledger
      - CLEDG_KAFKA__HOST=kafka
      - CLEDG_KAFKA__PORT=9092
      - CLEDG_SIDECAR__DISABLED=true
    ports:
      - "3001:3001"
    networks:
      - mojaloop-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ML API Adapter
  ml-api-adapter:
    image: mojaloop/ml-api-adapter:v14.0.0
    container_name: mojaloop-ml-api-adapter
    depends_on:
      - kafka
      - central-ledger
    environment:
      - MLAPI_KAFKA__HOST=kafka
      - MLAPI_KAFKA__PORT=9092
      - MLAPI_ENDPOINT_SOURCE_URL=http://central-ledger:3001
    ports:
      - "3000:3000"
    networks:
      - mojaloop-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Account Lookup Service
  account-lookup-service:
    image: mojaloop/account-lookup-service:v14.0.0
    container_name: mojaloop-account-lookup
    depends_on:
      - mongodb
      - kafka
    environment:
      - ALS_DATABASE__HOST=mongodb
      - ALS_DATABASE__PORT=27017
      - ALS_DATABASE__USER=root
      - ALS_DATABASE__PASSWORD=root
      - ALS_KAFKA__HOST=kafka
      - ALS_KAFKA__PORT=9092
    ports:
      - "4002:4002"
    networks:
      - mojaloop-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Quoting Service
  quoting-service:
    image: mojaloop/quoting-service:v15.0.0
    container_name: mojaloop-quoting
    depends_on:
      - mysql
      - kafka
    environment:
      - QS_DATABASE__HOST=mysql
      - QS_DATABASE__PORT=3306
      - QS_DATABASE__USER=root
      - QS_DATABASE__PASSWORD=root
      - QS_KAFKA__HOST=kafka
      - QS_KAFKA__PORT=9092
    ports:
      - "3002:3002"
    networks:
      - mojaloop-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Transaction Requests Service
  transaction-requests-service:
    image: mojaloop/transaction-requests-service:v14.0.0
    container_name: mojaloop-transaction-requests
    depends_on:
      - mysql
      - kafka
    environment:
      - TR_DATABASE__HOST=mysql
      - TR_DATABASE__PORT=3306
      - TR_DATABASE__USER=root
      - TR_DATABASE__PASSWORD=root
      - TR_KAFKA__HOST=kafka
      - TR_KAFKA__PORT=9092
    ports:
      - "4003:4003"
    networks:
      - mojaloop-network

  # Bulk API Adapter
  bulk-api-adapter:
    image: mojaloop/bulk-api-adapter:v14.0.0
    container_name: mojaloop-bulk-api-adapter
    depends_on:
      - kafka
      - central-ledger
    environment:
      - BULK_KAFKA__HOST=kafka
      - BULK_KAFKA__PORT=9092
    ports:
      - "3003:3003"
    networks:
      - mojaloop-network

  # Mojaloop Simulator (for testing)
  simulator:
    image: mojaloop/simulator:v13.0.0
    container_name: mojaloop-simulator
    environment:
      - SCHEME_NAME=payerfsp
      - DFSP_ID=payerfsp
      - BACKEND_ENDPOINT=http://ml-api-adapter:3000
    ports:
      - "8444:8444"
    networks:
      - mojaloop-network

  # Settlement Service
  settlement-service:
    image: mojaloop/settlement:v15.0.0
    container_name: mojaloop-settlement
    depends_on:
      - mysql
      - kafka
    environment:
      - SETTLEMENT_DATABASE__HOST=mysql
      - SETTLEMENT_DATABASE__PORT=3306
      - SETTLEMENT_DATABASE__USER=root
      - SETTLEMENT_DATABASE__PASSWORD=root
      - SETTLEMENT_KAFKA__HOST=kafka
      - SETTLEMENT_KAFKA__PORT=9092
    ports:
      - "3007:3007"
    networks:
      - mojaloop-network

  # Event Sidecar (for event streaming)
  event-sidecar:
    image: mojaloop/event-sidecar:v12.0.0
    container_name: mojaloop-event-sidecar
    depends_on:
      - kafka
    environment:
      - EVENT_KAFKA__HOST=kafka
      - EVENT_KAFKA__PORT=9092
    networks:
      - mojaloop-network

volumes:
  mysql-data:
  mongodb-data:

networks:
  mojaloop-network:
    name: mojaloop-network
    driver: bridge
