# Fluvio Streaming Platform — Kubernetes Deployment
#
# Deploy via Helm:
#   helm repo add fluvio https://infinyon.github.io/charts
#   helm repo update
#   helm install fluvio fluvio/fluvio \
#     --namespace fluvio-system \
#     --create-namespace \
#     --values infrastructure/fluvio/helm-values.yaml
#
# After install, apply this file to create topics:
#   kubectl apply -f infrastructure/fluvio/k8s-deployment.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: fluvio-system
  labels:
    app.kubernetes.io/managed-by: helm
---
# ServiceAccount for the topic init job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluvio-topic-init
  namespace: fluvio-system
---
# One-time Job to create all required Fluvio topics after cluster is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: fluvio-topic-init
  namespace: fluvio-system
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: fluvio-topic-init
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-sc
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Fluvio SC..."
              until nc -z fluvio-sc 9003; do sleep 3; done
              echo "Fluvio SC is ready"
      containers:
        - name: topic-init
          image: infinyon/fluvio:latest
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              fluvio profile add k8s fluvio-sc:9003

              create_topic() {
                fluvio topic create "$1" --partitions "$2" --replication "$3" --retention-time "$4" \
                  2>/dev/null && echo "Created: $1" || echo "Already exists: $1"
              }

              create_topic property-views    6 2 7d
              create_topic property-searches 4 2 30d
              create_topic transactions      4 3 365d
              create_topic alert-triggers    2 2 30d
              create_topic user-activity     8 2 14d
              create_topic price-changes     4 2 90d
              create_topic audit-events      2 3 1825d

              echo "All topics created/verified"
              fluvio topic list
          env:
            - name: FLUVIO_PROFILE
              value: k8s
---
# Prometheus ServiceMonitor for Fluvio metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fluvio
  namespace: fluvio-system
  labels:
    app: fluvio
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluvio
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
