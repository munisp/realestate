# OpenAppSec WAF Policy for Nigerian Real Estate Platform
# Enforces OWASP Top 10 protection + custom rules

name: realestate-waf-policy
mode: prevent  # prevent | detect | inactive

# OWASP Top 10 protections
protections:
  sql_injection:
    enabled: true
    sensitivity: high
  xss:
    enabled: true
    sensitivity: high
  path_traversal:
    enabled: true
    sensitivity: high
  command_injection:
    enabled: true
    sensitivity: high
  ldap_injection:
    enabled: true
  xml_injection:
    enabled: true
  ssrf:
    enabled: true
    sensitivity: medium
  file_upload:
    enabled: true
    allowed_extensions: [jpg, jpeg, png, gif, webp, pdf, doc, docx]
    max_file_size_mb: 10

# Rate limiting
rate_limiting:
  enabled: true
  rules:
    - path: "/api/trpc/auth.*"
      requests_per_minute: 20
      burst: 5
    - path: "/api/trpc/payment.*"
      requests_per_minute: 10
      burst: 2
    - path: "/api/trpc/.*"
      requests_per_minute: 120
      burst: 30
    - path: "/api/webhooks/.*"
      requests_per_minute: 60
      burst: 10

# IP reputation
ip_reputation:
  enabled: true
  block_tor_exit_nodes: false  # Allow Tor for privacy
  block_known_bad_ips: true
  threat_intelligence_feeds:
    - spamhaus
    - emerging_threats

# Custom rules for Nigerian real estate platform
custom_rules:
  - name: block_suspicious_property_price
    description: Block requests with obviously invalid property prices
    condition: "request.body contains 'price' and request.body.price < 0"
    action: block

  - name: protect_payment_endpoints
    description: Require Content-Type for payment mutations
    condition: "request.path matches '/api/trpc/payment.*' and request.method == 'POST' and not request.headers['content-type'] contains 'application/json'"
    action: block

  - name: block_admin_brute_force
    description: Block repeated admin login failures
    condition: "request.path == '/api/trpc/auth.login' and session.failed_attempts > 5"
    action: block_and_alert

# Logging
logging:
  level: info
  include_request_body: false  # PII protection
  include_response_body: false
  alert_on_block: true
  alert_webhook: "${ALERT_WEBHOOK_URL}"
