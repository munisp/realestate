version: '3.8'

services:
  # etcd - Configuration storage for APISIX
  etcd:
    image: bitnami/etcd:3.5.9
    container_name: apisix-etcd
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/bitnami/etcd
    networks:
      - apisix-network

  # Apache APISIX - API Gateway
  apisix:
    image: apache/apisix:3.7.0-debian
    container_name: apisix-gateway
    restart: always
    volumes:
      - ./config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./routes.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - apisix-logs:/usr/local/apisix/logs
    depends_on:
      - etcd
    ports:
      - "9080:9080"   # HTTP
      - "9443:9443"   # HTTPS
      - "9091:9091"   # Prometheus metrics
      - "9180:9180"   # Admin API
    environment:
      - APISIX_STAND_ALONE=false
    networks:
      - apisix-network

  # APISIX Dashboard - Web UI for management
  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    container_name: apisix-dashboard
    restart: always
    volumes:
      - ./dashboard-conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      - apisix
    ports:
      - "9000:9000"
    networks:
      - apisix-network

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: apisix-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - apisix-network

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: apisix-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - apisix-network

volumes:
  etcd-data:
  apisix-logs:
  prometheus-data:
  grafana-data:

networks:
  apisix-network:
    name: apisix-network
    driver: bridge
