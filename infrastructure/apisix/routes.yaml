# APISIX Routes Configuration for Real Estate Platform

routes:
  # Property Service Routes
  - id: property-service
    uri: /api/v1/properties/*
    name: "Property Service API"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    upstream:
      type: roundrobin
      nodes:
        "property-service:8080": 1
      timeout:
        connect: 6
        send: 6
        read: 6
    plugins:
      jwt-auth: {}
      limit-count:
        count: 1000
        time_window: 60
        rejected_code: 429
      prometheus: {}
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "*"
        max_age: 3600

  # Valuation Service Routes
  - id: valuation-service
    uri: /api/v1/valuations/*
    name: "Valuation Service API"
    methods: ["GET", "POST"]
    upstream:
      type: roundrobin
      nodes:
        "valuation-service:8081": 1
      timeout:
        connect: 30
        send: 30
        read: 30
    plugins:
      jwt-auth: {}
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
      prometheus: {}
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,OPTIONS"
        allow_headers: "*"

  # User Service Routes
  - id: user-service
    uri: /api/v1/users/*
    name: "User Service API"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    upstream:
      type: roundrobin
      nodes:
        "user-service:8082": 1
      timeout:
        connect: 6
        send: 6
        read: 6
    plugins:
      jwt-auth: {}
      limit-count:
        count: 500
        time_window: 60
        rejected_code: 429
      prometheus: {}
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "*"

  # Transaction Service Routes
  - id: transaction-service
    uri: /api/v1/transactions/*
    name: "Transaction Service API"
    methods: ["GET", "POST", "PUT", "PATCH"]
    upstream:
      type: roundrobin
      nodes:
        "transaction-service:8083": 1
      timeout:
        connect: 60
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-count:
        count: 200
        time_window: 60
        rejected_code: 429
      prometheus: {}
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,PATCH,OPTIONS"
        allow_headers: "*"

  # Geospatial Service Routes
  - id: geospatial-service
    uri: /api/v1/geospatial/*
    name: "Geospatial Service API"
    methods: ["GET", "POST"]
    upstream:
      type: roundrobin
      nodes:
        "geospatial-service:8084": 1
      timeout:
        connect: 15
        send: 15
        read: 15
    plugins:
      jwt-auth: {}
      limit-count:
        count: 500
        time_window: 60
        rejected_code: 429
      prometheus: {}
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,OPTIONS"
        allow_headers: "*"

  # Public Health Check (no auth)
  - id: health-check
    uri: /health
    name: "Health Check"
    methods: ["GET"]
    upstream:
      type: roundrobin
      nodes:
        "property-service:8080": 1
    plugins:
      prometheus: {}

# Global Plugins
global_rules:
  - id: global-rate-limit
    plugins:
      limit-count:
        count: 10000
        time_window: 60
        rejected_code: 429
        key: "remote_addr"
      
  - id: global-logging
    plugins:
      http-logger:
        uri: "http://log-collector:8080/logs"
        batch_max_size: 100
        inactive_timeout: 5
        buffer_duration: 60
        max_retry_count: 3
      
  - id: global-metrics
    plugins:
      prometheus:
        prefer_name: true

# Upstreams Configuration
upstreams:
  - id: property-service-upstream
    name: "Property Service"
    type: roundrobin
    nodes:
      "property-service:8080": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
    
  - id: valuation-service-upstream
    name: "Valuation Service"
    type: roundrobin
    nodes:
      "valuation-service:8081": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
    
  - id: user-service-upstream
    name: "User Service"
    type: roundrobin
    nodes:
      "user-service:8082": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
    
  - id: transaction-service-upstream
    name: "Transaction Service"
    type: roundrobin
    nodes:
      "transaction-service:8083": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
    
  - id: geospatial-service-upstream
    name: "Geospatial Service"
    type: roundrobin
    nodes:
      "geospatial-service:8084": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
