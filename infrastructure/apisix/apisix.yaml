routes:
  - uri: /api/trpc/*
    name: tRPC API Routes
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:3000": 1
    plugins:
      limit-req:
        rate: 100
        burst: 50
        rejected_code: 429
        key_type: "var"
        key: "remote_addr"
      limit-count:
        count: 1000
        time_window: 60
        rejected_code: 429
        key_type: "var"
        key: "remote_addr"
      proxy-cache:
        cache_ttl: 60
        cache_key:
          - "$host"
          - "$request_uri"
        cache_bypass:
          - "$arg_bypass"
        cache_method:
          - GET
        cache_http_status:
          - 200
        cache_control: true
      authz-keycloak:
        discovery: "http://keycloak:8080/realms/realestate/.well-known/openid-configuration"
        client_id: "realestate-api"
        client_secret: "${KEYCLOAK_CLIENT_SECRET}"
        bearer_only: true
        realm: "realestate"
        logout_path: "/api/logout"
        redirect_uri: "/api/oauth/callback"
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "*"
        expose_headers: "*"
        max_age: 3600
        allow_credential: true
      prometheus:
        prefer_name: true

  - uri: /api/properties/*
    name: Properties API
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:3000": 1
    plugins:
      limit-req:
        rate: 200
        burst: 100
        key: "remote_addr"
      proxy-cache:
        cache_ttl: 300
        cache_key:
          - "$uri"
          - "$args"
      cors:
        allow_origins: "*"

  - uri: /api/search/*
    name: Search API
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:3000": 1
    plugins:
      limit-req:
        rate: 50
        burst: 25
        key: "remote_addr"
      proxy-cache:
        cache_ttl: 120
      cors:
        allow_origins: "*"

  - uri: /api/auth/*
    name: Authentication API
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:3000": 1
    plugins:
      limit-req:
        rate: 10
        burst: 5
        key: "remote_addr"
      cors:
        allow_origins: "*"

  - uri: /api/payments/*
    name: Payments API
    upstream:
      type: roundrobin
      nodes:
        "payment-service:8080": 1
    plugins:
      limit-req:
        rate: 20
        burst: 10
        key: "remote_addr"
      authz-keycloak:
        discovery: "http://keycloak:8080/realms/realestate/.well-known/openid-configuration"
        client_id: "realestate-api"
        bearer_only: true
      cors:
        allow_origins: "*"

  - uri: /api/geospatial/*
    name: Geospatial API
    upstream:
      type: roundrobin
      nodes:
        "geospatial-service:8000": 1
    plugins:
      limit-req:
        rate: 100
        burst: 50
        key: "remote_addr"
      proxy-cache:
        cache_ttl: 600
      cors:
        allow_origins: "*"

upstreams:
  - name: main-app
    type: roundrobin
    nodes:
      "host.docker.internal:3000": 1
    timeout:
      connect: 6
      send: 6
      read: 6
    keepalive_pool:
      size: 320
      idle_timeout: 60
      requests: 1000

  - name: payment-service
    type: roundrobin
    nodes:
      "payment-service:8080": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 2
          successes: 2
        unhealthy:
          interval: 1
          http_failures: 2

  - name: geospatial-service
    type: roundrobin
    nodes:
      "geospatial-service:8000": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 2
          successes: 2
        unhealthy:
          interval: 1
          http_failures: 2

global_rules:
  - id: 1
    plugins:
      prometheus:
        prefer_name: true
      request-id:
        include_in_response: true
      real-ip:
        source: "http_x_forwarded_for"
        trusted_addresses:
          - "0.0.0.0/0"
#END
