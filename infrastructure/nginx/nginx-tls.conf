# Nginx TLS termination for docker-compose / on-premise deployments
# Place TLS certificates at:
#   /etc/nginx/certs/fullchain.pem
#   /etc/nginx/certs/privkey.pem
# Generate with: certbot certonly --standalone -d your-domain.com

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    # ── Security ────────────────────────────────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Rate limiting zones ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"remote_addr":"$remote_addr",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge for cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${APP_DOMAIN};

        # TLS configuration
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # HSTS (2 years)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-Frame-Options           "DENY"          always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Auth endpoints (strict rate limit) ─────────────────────────────
        location ~ ^/api/(oauth|auth)/ {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://app:3000;
            include /etc/nginx/proxy_params;
        }

        # ── API endpoints ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://app:3000;
            include /etc/nginx/proxy_params;
        }

        # ── Health / metrics (internal only) ───────────────────────────────
        location ~ ^/(health|ready|metrics)$ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://app:3000;
            include /etc/nginx/proxy_params;
        }

        # ── Static assets (long cache) ──────────────────────────────────────
        location /assets/ {
            limit_req zone=global burst=200 nodelay;
            proxy_pass http://app:3000;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            include /etc/nginx/proxy_params;
        }

        # ── Default ─────────────────────────────────────────────────────────
        location / {
            limit_req zone=global burst=200 nodelay;
            proxy_pass http://app:3000;
            include /etc/nginx/proxy_params;
        }
    }
}
