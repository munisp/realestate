version: "3.9"

# Nginx TLS termination for docker-compose deployments.
# Usage: docker-compose -f docker-compose.yml -f infrastructure/nginx/docker-compose.nginx.yml up -d
#
# Prerequisites:
#   1. Place TLS certificates at ./certs/fullchain.pem and ./certs/privkey.pem
#      OR use the certbot service below to obtain them automatically.
#   2. Set APP_DOMAIN in your .env file.

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: realestate-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-tls.conf:/etc/nginx/nginx.conf:ro
      - ./proxy_params:/etc/nginx/proxy_params:ro
      - nginx-certs:/etc/nginx/certs:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - realestate-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Certbot for automatic Let's Encrypt certificate renewal
  certbot:
    image: certbot/certbot:latest
    container_name: realestate-certbot
    volumes:
      - nginx-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Renew certificates every 12 hours (certbot checks if renewal is needed)
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - realestate-network

volumes:
  nginx-certs:
  certbot-www:

networks:
  realestate-network:
    external: true
