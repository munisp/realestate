server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            timestamp: time
            message: msg
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          trace_id:
          span_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: message

  # Escrow Service logs
  - job_name: escrow-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: escrow-service
          service: escrow
          __path__: /var/log/escrow-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: ts
            message: msg
            trace_id: trace_id
            span_id: span_id
            escrow_id: escrow_id
            operation: operation
      - labels:
          level:
          trace_id:
          operation:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Mojaloop Service logs
  - job_name: mojaloop-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: mojaloop-service
          service: mojaloop
          __path__: /var/log/mojaloop-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: ts
            message: msg
            trace_id: trace_id
            transfer_id: transfer_id
            quote_id: quote_id
      - labels:
          level:
          trace_id:

  # TigerBeetle Service logs
  - job_name: tigerbeetle-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: tigerbeetle-service
          service: tigerbeetle
          __path__: /var/log/tigerbeetle-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: ts
            message: msg
            trace_id: trace_id
            account_id: account_id
            transfer_id: transfer_id
      - labels:
          level:
          trace_id:

  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<app>\S+):\s+(?P<message>.*)$'
      - labels:
          hostname:
          app:
      - timestamp:
          source: timestamp
          format: 'Jan _2 15:04:05'

  # Redis logs
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          service: redis
          __path__: /var/log/redis/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d+:\w+\s+\d+\s+\w+\s+\d+:\d+:\d+\.\d+)\s+(?P<level>\w+)\s+(?P<message>.*)$'
      - labels:
          level:

limits_config:
  readline_rate_enabled: true
  readline_rate: 10000
  readline_burst: 20000
