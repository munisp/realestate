version: '3.8'

services:
  # ============================================================================
  # Database Services
  # ============================================================================
  
  #   mysql:
  #     image: mysql:8.0
  #     container_name: realestate-mysql
  #     environment:
  #       MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
  #       MYSQL_DATABASE: ${MYSQL_DATABASE:-realestate}
  #       MYSQL_USER: ${MYSQL_USER:-realestate_user}
  #       MYSQL_PASSWORD: ${MYSQL_PASSWORD:-realestate_pass}
  #     ports:
  #       - "3306:3306"
  #     volumes:
  #       - mysql_data:/var/lib/mysql
  #     networks:
  #       - realestate-network
  #     healthcheck:
  #       test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #       interval: 10s
  #       timeout: 5s
  #       retries: 5

  postgres:
    image: postgis/postgis:15-3.3
    container_name: realestate-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-realestate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - realestate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - realestate-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Message Queue
  # ============================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: realestate-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - realestate-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: realestate-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - realestate-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Go Microservices
  # ============================================================================
  
  payment-service:
    build:
      context: ./services/go/payment-service
      dockerfile: Dockerfile
    container_name: realestate-payment-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/realestate
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - PORT=8080
    ports:
      - "8080:8080"
      - "50051:50051"  # gRPC port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - realestate-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/go/notification-service
      dockerfile: Dockerfile
    container_name: realestate-notification-service
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=8081
    ports:
      - "8081:8081"
      - "50052:50052"  # gRPC port
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - realestate-network
    restart: unless-stopped

  image-service:
    build:
      context: ./services/go/image-service
      dockerfile: Dockerfile
    container_name: realestate-image-service
    environment:
      - PORT=8082
      - MAX_IMAGE_SIZE=10485760  # 10MB
    ports:
      - "8082:8082"
      - "50053:50053"  # gRPC port
    networks:
      - realestate-network
    restart: unless-stopped

  # ============================================================================
  # Python AI Services
  # ============================================================================
  
  ml-valuation-service:
    build:
      context: ./services/python/ml-valuation
      dockerfile: Dockerfile
    container_name: realestate-ml-valuation
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/realestate
      - MODEL_PATH=/app/models
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - realestate-network
    restart: unless-stopped

  ocr-service:
    build:
      context: ./services/python/ocr-service
      dockerfile: Dockerfile
    container_name: realestate-ocr-service
    environment:
      - PORT=5001
      - TESSERACT_PATH=/usr/bin/tesseract
    ports:
      - "5001:5001"
    networks:
      - realestate-network
    restart: unless-stopped

  fraud-detection-service:
    build:
      context: ./services/python/fraud-detection
      dockerfile: Dockerfile
    container_name: realestate-fraud-detection
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/realestate
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MODEL_PATH=/app/models
      - PORT=5002
    ports:
      - "5002:5002"
    volumes:
      - fraud_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - realestate-network
    restart: unless-stopped

  # ============================================================================
  # MLflow (Model Tracking)
  # ============================================================================
  
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.1
    container_name: realestate-mlflow
    ports:
      - "5050:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:password@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - realestate-network

networks:
  realestate-network:
    driver: bridge

volumes:
  #   mysql_data:
  postgres_data:
  redis_data:
  ml_models:
  fraud_models:
  mlflow_data:
