version: '3.8'

services:
  postgis:
    image: postgis/postgis:15-3.3
    container_name: realestate-postgis
    environment:
      POSTGRES_DB: realestate_spatial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD:-postgis_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./scripts/postgis-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realestate-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: realestate-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@realestate.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgis
    restart: unless-stopped
    networks:
      - realestate-network

volumes:
  postgis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  realestate-network:
    driver: bridge
