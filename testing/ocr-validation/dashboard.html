<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Testing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #2c3e50;
        }
        .stat-value.good { color: #27ae60; }
        .stat-value.warning { color: #f39c12; }
        .stat-value.bad { color: #e74c3c; }
        .chart-container {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: #2980b9;
        }
        .last-updated {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 OCR Testing Dashboard</h1>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
        <div class="last-updated" id="lastUpdated">Last updated: Never</div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Overall Accuracy</div>
                <div class="stat-value good" id="overallAccuracy">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Samples</div>
                <div class="stat-value" id="totalSamples">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Passport Accuracy</div>
                <div class="stat-value" id="passportAccuracy">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">NIN Accuracy</div>
                <div class="stat-value" id="ninAccuracy">--</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Accuracy Trend Over Time</div>
            <canvas id="accuracyTrendChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Accuracy by Document Type</div>
            <canvas id="docTypeChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Field-Level Accuracy</div>
            <canvas id="fieldAccuracyChart"></canvas>
        </div>
    </div>
    
    <script>
        let accuracyTrendChart, docTypeChart, fieldAccuracyChart;
        
        async function loadData() {
            try {
                // Load latest results
                const response = await fetch('./monitoring-results/');
                const files = await response.text();
                
                // Parse file list and get latest
                const resultFiles = files.match(/results_[\d-T]+\.json/g) || [];
                if (resultFiles.length === 0) {
                    console.log('No results found');
                    return;
                }
                
                const latestFile = resultFiles.sort().reverse()[0];
                const data = await fetch(`./monitoring-results/${latestFile}`).then(r => r.json());
                
                updateStats(data);
                updateCharts(data);
                
                document.getElementById('lastUpdated').textContent = 
                    `Last updated: ${new Date(data.timestamp).toLocaleString()}`;
                
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        
        function updateStats(data) {
            const overall = data.overall_accuracy;
            document.getElementById('overallAccuracy').textContent = 
                (overall * 100).toFixed(1) + '%';
            document.getElementById('overallAccuracy').className = 
                'stat-value ' + (overall >= 0.9 ? 'good' : overall >= 0.8 ? 'warning' : 'bad');
            
            document.getElementById('totalSamples').textContent = data.total_samples;
            
            const passportAcc = data.results_by_type.passport?.average_accuracy || 0;
            document.getElementById('passportAccuracy').textContent = 
                (passportAcc * 100).toFixed(1) + '%';
            document.getElementById('passportAccuracy').className = 
                'stat-value ' + (passportAcc >= 0.9 ? 'good' : passportAcc >= 0.8 ? 'warning' : 'bad');
            
            const ninAcc = data.results_by_type.nin?.average_accuracy || 0;
            document.getElementById('ninAccuracy').textContent = 
                (ninAcc * 100).toFixed(1) + '%';
            document.getElementById('ninAccuracy').className = 
                'stat-value ' + (ninAcc >= 0.9 ? 'good' : ninAcc >= 0.8 ? 'warning' : 'bad');
        }
        
        function updateCharts(data) {
            // Document Type Chart
            const docTypes = Object.keys(data.results_by_type);
            const accuracies = docTypes.map(type => 
                (data.results_by_type[type].average_accuracy * 100).toFixed(1)
            );
            
            if (docTypeChart) docTypeChart.destroy();
            docTypeChart = new Chart(document.getElementById('docTypeChart'), {
                type: 'bar',
                data: {
                    labels: docTypes.map(t => t.toUpperCase()),
                    datasets: [{
                        label: 'Accuracy (%)',
                        data: accuracies,
                        backgroundColor: '#3498db',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: value => value + '%'
                            }
                        }
                    }
                }
            });
            
            // Field Accuracy Chart
            const firstType = docTypes[0];
            const fields = Object.keys(data.results_by_type[firstType].field_accuracies);
            const fieldAccs = fields.map(field => 
                (data.results_by_type[firstType].field_accuracies[field] * 100).toFixed(1)
            );
            
            if (fieldAccuracyChart) fieldAccuracyChart.destroy();
            fieldAccuracyChart = new Chart(document.getElementById('fieldAccuracyChart'), {
                type: 'bar',
                data: {
                    labels: fields,
                    datasets: [{
                        label: 'Accuracy (%)',
                        data: fieldAccs,
                        backgroundColor: '#2ecc71',
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: value => value + '%'
                            }
                        }
                    }
                }
            });
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
