apiVersion: v1
kind: Service
metadata:
  name: valuation-service
  labels:
    app: valuation-service
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: valuation-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valuation-service
  labels:
    app: valuation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: valuation-service
  template:
    metadata:
      labels:
        app: valuation-service
    spec:
      containers:
      - name: valuation-service
        image: realestate/valuation-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: connection-string
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: realestate-config
              key: redis.host
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: realestate-config
              key: kafka.brokers
        - name: KAFKA_TOPIC
          value: "valuation-events"
        - name: KAFKA_GROUP_ID
          value: "valuation-service"
        - name: MODEL_PATH
          value: "/app/models"
        - name: MODEL_VERSION
          value: "v1.0.0"
        - name: RAY_ADDRESS
          value: "ray-head:10001"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow:5000"
        volumeMounts:
        - name: models
          mountPath: /app/models
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/v1/valuations/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/valuations/ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ml-models-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: valuation-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: valuation-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
